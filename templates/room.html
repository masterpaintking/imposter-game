{% extends 'base.html'%} {% block content%}
<div class="room-container">
    <div class="message-box">
        <h2>Chat Room: {{code}}</h2>
        <div class="messages" id="messages"></div>
        <div class="inputs">
            <input type="text" rows="3" placeholder="Message" name="message" id="message"/>
            <button type="button" name="send" id="send-btn" onclick="sendMessage()">Send</button>
            <button type="button" id="start-game-btn" onclick="startGame()">Start Game</button>
        </div>
        <div class="timer-bar">
            <div class="timer-fill" id="timer-fill"></div>
        </div>
    </div>
    <div class="player-list" id="player-list"></div>
</div>
<script type="text/javascript">
    var socketio = io();
    const messages = document.getElementById("messages");
    const create_message = (name,msg) =>{
        const content = `
        <div class='text'>
            <span>
                <strong> ${name} </strong> ${msg}
            </span> 
        </div>
        `;
        messages.innerHTML +=content;
        messages.scrollTop = messages.scrollHeight;
    }
    const playerList = document.getElementById("player-list");

    socketio.on("message",(data) => {
        create_message(data.name,data.message);
    });

    socketio.on("players_update", (data) => {
        renderPlayers(data.players);
    });

    const renderPlayers = (players) => {
        playerList.innerHTML = "";
        players.forEach(player => {
            const row = document.createElement("div");
            row.className = "player-row";

            const nameDiv = document.createElement("div");
            nameDiv.className = "player-name";
            nameDiv.textContent = player.name;

            const votesDiv = document.createElement("div");
            votesDiv.className = "player-votes";
            votesDiv.textContent = `Votes: ${player.votes}`;

            const voteButton = document.createElement("button");
            voteButton.className = "player-vote-btn";
            voteButton.textContent = "Vote";
            voteButton.onclick = () => votePlayer(player.sid);

            row.appendChild(nameDiv);
            row.appendChild(votesDiv);
            row.appendChild(voteButton);
            playerList.appendChild(row);
        });
    };

    const votePlayer = (targetSid) => {
        socketio.emit("vote", {target: targetSid});
    };

    const sendMessage = () => {
        const message = document.getElementById("message")
        if (message.value =="")return;
        socketio.emit("message",{data: message.value});
        message.value = ""
    };
    const startGame = () => {
        socketio.emit("startGame")
    };
    socketio.on("freeze_button",() =>{
        const btn = document.getElementById("start-game-btn")
        btn.disabled = true
        btn.textContent = "starting..."
    });
    socketio.on("unfreeze_button",() =>{
        const btn = document.getElementById("start-game-btn")
        btn.style.backgroundColor = "#2A9D8F"; // teal
        btn.disabled = false
        btn.textContent = "Start Game"
    });
    socketio.on("timer_update", (data) => {
    const btn = document.getElementById("start-game-btn");
    const fill = document.getElementById("timer-fill");

    btn.textContent = `Time left: ${data.time_left}s`;

    btn.classList.remove("pulse-warning");

    // Change button color dynamically
    if (data.time_left > 15) {
        btn.style.backgroundColor = "#2A9D8F"; // teal
    } else if (data.time_left > 0) {
        btn.style.backgroundColor = "#F4A261"; // orange warning
        btn.classList.add("pulse-warning");    // start pulsing
    } else {
        btn.style.backgroundColor = "#E63946"; // red danger
        btn.textContent = `Time is up!`
    }

    // Update progress bar width
    const totalTime = 180; // matches your backend countdown
    const percent = (data.time_left / totalTime) * 100;
    fill.style.width = percent + "%";
    });

    socketio.on("reset_game", ()=>{
        socketio.emit("reset_game")
    });
</script>

{% for msg in messages %}
<script type="text/javascript">
    create_message("{{msg.name}}","{{msg.message}}")
</script>
{% endfor %}
{% endblock %}
